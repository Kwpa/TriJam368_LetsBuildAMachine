name: itch.io upload

# define what triggers the action
# in this case: on push if one of the files named in paths changes
on:
  push:
    paths:
      - "version.txt"
      - ".github/workflows/upload-itchio.yml"

# the directory where your game is
# I always put the game inside a 'game' folder
env:
  WORKING_DIRECTORY: godot_trijam368
  PROJECT_NAME: trijam368

jobs:
  deploy:
    # only run action, if pushed on main branch
    # change or remove according to your needs
    # removed ---- if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout source code
        uses: actions/checkout@v3
    
      # change or remove according to your needs
      - name: Delete iOS icons
        run: rm -rf $WORKING_DIRECTORY/AppIcons
      
      # Added
      - name: Save build folder as variable
        shell: bash
        run: | 
          file=version.txt
          while IFS= read -r varname; do
            printf '%s\n' "$varname"
            echo "BUILD_FOLDER=$PROJECT_NAME$varname" >> $GITHUB_ENV
          done < "$file"
      
      # make the directory name based off of version file contents
      - name: Create export directory
        run: 
          mkdir "$BUILD_FOLDER"

      # exports the game in html mode
      # more info here https://github.com/dulvui/godot-html-export
      - name: Godot HTML5 export
        uses: Kwpa/godot-html-export@v0.2.3
        with:
          working-directory: $WORKING_DIRECTORY
          build-folder-name: $BUILD_FOLDER

      # uploads to itch.io
      # more info here https://github.com/dulvui/itchio-butler-upload
      - name: Upload to itch.io
        uses: Kwpa/itchio-butler-upload@v0.1.1
        with:
          working-directory: $BUILD_FOLDER
          api-key: ${{ secrets.ITCHIO_API_KEY }}
          user: gradiustheguide
          game: trijam-368-lets-build-a-machine
          channel: html5
